<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Rebuilding the Palisades — A Community Tracker</title>
<meta name="description" content="A community tracker for Pacific Palisades fire rebuild permits, construction, and milestones. Sourced daily from official LA City, LA County, and California state dashboards." />

<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,300..900&family=IBM+Plex+Sans:wght@300;400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet" />

<style>
  /* Palette: warm Caruso-retail tones referencing Palisades Village */
  :root {
    --paper:       #f4ede0;
    --paper-deep:  #ede4d1;
    --ink:         #2b1d10;
    --ink-soft:    #5a4a38;
    --ink-fade:    #8a7a64;
    --rule:        #d9cdb3;
    --ember:       #b85c3a;
    --ember-deep:  #8c3e22;
  }

  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    background: var(--paper);
    color: var(--ink);
    font-family: 'IBM Plex Sans', system-ui, sans-serif;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
  }
  a { color: inherit; }

  .wrap { max-width: 1240px; margin: 0 auto; padding: 0 40px; }
  @media (max-width: 700px) { .wrap { padding: 0 22px; } }

  .font-display { font-family: 'Fraunces', Georgia, serif; font-optical-sizing: auto; }
  .font-body    { font-family: 'IBM Plex Sans', sans-serif; }
  .font-mono    { font-family: 'IBM Plex Mono', ui-monospace, monospace; }

  .kicker {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px; letter-spacing: 0.22em; text-transform: uppercase;
    color: var(--ink-fade);
  }

  .rule-top { border-top: 1px solid var(--rule); }
  .rule-double-top {
    background-image: linear-gradient(to bottom, var(--ink) 0, var(--ink) 1px, transparent 1px, transparent 4px, var(--ink) 4px, var(--ink) 5px, transparent 5px);
    background-size: 100% 5px; background-repeat: no-repeat; background-position: top;
    padding-top: 14px;
  }

  /* Masthead */
  .masthead-top {
    display: flex; justify-content: space-between; align-items: center;
    padding-top: 28px; padding-bottom: 60px; gap: 20px;
  }
  .pulse-dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: var(--ember);
    box-shadow: 0 0 0 0 rgba(184, 92, 58, 0.6);
    animation: pulse 2s infinite; flex-shrink: 0;
  }
  @keyframes pulse {
    0%   { box-shadow: 0 0 0 0 rgba(184, 92, 58, 0.6); }
    70%  { box-shadow: 0 0 0 12px rgba(184, 92, 58, 0); }
    100% { box-shadow: 0 0 0 0 rgba(184, 92, 58, 0); }
  }
  .live-tag {
    display: flex; align-items: center; gap: 8px;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px; letter-spacing: 0.18em; text-transform: uppercase;
  }

  /* HERO */
  .hero { padding-bottom: 80px; padding-top: 0; }
  .hero-title {
    font-family: 'Fraunces', serif;
    font-size: clamp(64px, 11vw, 168px);
    line-height: 0.88;
    font-weight: 350;
    letter-spacing: -0.035em;
    text-transform: uppercase;
    font-variation-settings: "opsz" 144;
    margin: 0 0 36px 0;
    color: var(--ink);
  }
  .hero-title em { font-style: italic; font-weight: 300; color: var(--ember-deep); }
  .hero-dek {
    font-family: 'Fraunces', serif;
    font-size: clamp(17px, 1.6vw, 21px);
    line-height: 1.5; max-width: 640px;
    font-weight: 300; color: var(--ink-soft);
    margin: 0 0 80px 0;
  }

  .hero-stats {
    display: grid; grid-template-columns: repeat(3, 1fr);
    gap: 1px; background: var(--rule);
    border-top: 1px solid var(--rule); border-bottom: 1px solid var(--rule);
  }
  @media (max-width: 720px) { .hero-stats { grid-template-columns: 1fr; } }
  .hero-stat {
    background: var(--paper);
    padding: 44px 32px 38px;
    display: flex; flex-direction: column;
    min-height: 240px; justify-content: space-between;
  }
  .hero-stat-count {
    font-family: 'Fraunces', serif;
    font-size: clamp(72px, 10vw, 140px);
    line-height: 0.85; font-weight: 350;
    letter-spacing: -0.04em;
    font-variation-settings: "opsz" 144;
    color: var(--ink);
  }
  .hero-stat-meta {
    display: flex; align-items: baseline; justify-content: space-between;
    margin-top: 24px; gap: 16px;
  }
  .hero-stat-label {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 12px; letter-spacing: 0.2em; text-transform: uppercase;
    color: var(--ink-fade);
  }
  .hero-stat-pct {
    font-family: 'Fraunces', serif;
    font-size: 28px; font-weight: 400; letter-spacing: -0.02em;
    color: var(--ember-deep);
  }

  .hero-baseline {
    margin-top: 28px;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 12px; letter-spacing: 0.16em;
    text-transform: uppercase; color: var(--ink-fade);
    text-align: center;
  }
  .hero-baseline strong { color: var(--ink); font-weight: 500; }

  /* Sections */
  section { padding-top: 64px; padding-bottom: 64px; }
  .section-head {
    display: flex; align-items: baseline; justify-content: space-between;
    margin-bottom: 36px; gap: 20px; flex-wrap: wrap;
  }
  h2.section-title {
    font-family: 'Fraunces', serif;
    font-size: clamp(32px, 3.5vw, 44px);
    font-weight: 400; margin: 0;
    letter-spacing: -0.02em; text-transform: uppercase;
    color: var(--ink);
  }
  .section-subtitle {
    font-family: 'Fraunces', serif;
    font-size: 17px; color: var(--ink-soft);
    max-width: 640px; line-height: 1.55;
    margin: 0 0 40px 0; font-weight: 300;
  }
  .section-tag {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px; color: var(--ink-fade);
    text-transform: uppercase; letter-spacing: 0.16em;
  }

  /* Detail stat grid */
  .stat-grid {
    display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
    gap: 1px; background: var(--rule);
    border: 1px solid var(--rule);
  }
  .stat-cell {
    background: var(--paper); padding: 30px 26px; min-height: 150px;
    display: flex; flex-direction: column; justify-content: space-between;
  }
  .stat-cell.accent { background: var(--paper-deep); }
  .stat-label {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10.5px; letter-spacing: 0.18em; text-transform: uppercase;
    color: var(--ink-fade); margin-bottom: 14px;
  }
  .stat-cell.accent .stat-label { color: var(--ember-deep); }
  .stat-value {
    font-family: 'Fraunces', serif;
    font-size: clamp(38px, 4.2vw, 52px);
    font-weight: 400; letter-spacing: -0.02em; line-height: 1;
    font-variation-settings: "opsz" 144;
  }
  .stat-sub {
    font-size: 12.5px; color: var(--ink-fade); margin-top: 8px;
    font-style: italic; font-family: 'Fraunces', serif;
  }
  .sources-note {
    font-size: 13px; color: var(--ink-fade);
    margin-top: 24px; line-height: 1.6;
  }
  .sources-note a { color: var(--ember-deep); text-underline-offset: 3px; }

  /* Pipeline */
  .pipeline-stage { margin-bottom: 14px; }
  .pipeline-row {
    display: flex; justify-content: space-between; align-items: baseline;
    margin-bottom: 8px; gap: 16px; flex-wrap: wrap;
  }
  .pipeline-label { display: flex; align-items: center; gap: 14px; flex-wrap: wrap; }
  .pipeline-num {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px; color: var(--ink-fade); width: 24px;
  }
  .pipeline-name { font-size: 15px; font-weight: 500; color: var(--ink); }
  .pipeline-drop {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px; color: var(--ember-deep); letter-spacing: 0.06em;
  }
  .pipeline-value {
    font-family: 'Fraunces', serif;
    font-weight: 400; font-size: 26px; letter-spacing: -0.02em;
  }
  .pipeline-bar { height: 10px; background: var(--paper-deep); position: relative; }
  .pipeline-fill { height: 100%; transition: width 1s ease; }

  .callout {
    margin-top: 36px; padding: 24px 28px;
    background: var(--paper-deep);
    border-left: 3px solid var(--ember);
  }
  .callout-label {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px; letter-spacing: 0.18em; text-transform: uppercase;
    color: var(--ember-deep); margin-bottom: 10px;
  }
  .callout-text {
    font-family: 'Fraunces', serif;
    font-size: 16px; line-height: 1.6; margin: 0;
    font-weight: 300; color: var(--ink);
  }

  /* Timeline */
  .timeline { position: relative; padding-left: 38px; }
  .timeline-line {
    position: absolute; left: 7px; top: 4px; bottom: 4px;
    width: 1px; background: var(--rule);
  }
  .timeline-event { position: relative; padding-bottom: 36px; }
  .timeline-dot {
    position: absolute; left: -38px; top: 8px;
    width: 15px; height: 15px; border-radius: 50%;
    background: var(--paper); border: 2px solid var(--ink-fade);
  }
  .timeline-dot.fire      { background: var(--ink); border-color: var(--ink); }
  .timeline-dot.milestone { background: var(--paper-deep); border-color: var(--ember); }
  .timeline-dot.current {
    background: var(--ember); border-color: var(--ember);
    box-shadow: 0 0 0 5px rgba(184, 92, 58, 0.18);
  }
  .timeline-date {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px; letter-spacing: 0.16em; text-transform: uppercase;
    color: var(--ink-fade); margin-bottom: 6px;
  }
  .timeline-date.current { color: var(--ember-deep); }
  .timeline-title {
    font-family: 'Fraunces', serif;
    font-size: 22px; font-weight: 400; margin-bottom: 8px;
    letter-spacing: -0.01em; color: var(--ink);
  }
  .timeline-detail {
    font-family: 'Fraunces', serif;
    font-size: 16px; color: var(--ink-soft);
    line-height: 1.6; max-width: 700px; font-weight: 300;
  }

  /* Neighborhood bars */
  .neighborhood-row {
    display: flex; align-items: center; gap: 22px; margin-bottom: 16px;
  }
  .neighborhood-name {
    width: 180px; font-size: 15px; font-weight: 500;
    flex-shrink: 0; color: var(--ink);
  }
  .neighborhood-bar {
    flex: 1; height: 28px; background: var(--paper-deep);
    position: relative; min-width: 80px;
  }
  .neighborhood-fill { height: 100%; transition: width 1.2s ease; }
  .neighborhood-value {
    font-family: 'Fraunces', serif; font-weight: 400; font-size: 24px;
    width: 70px; text-align: right; letter-spacing: -0.02em;
    color: var(--ink);
  }
  .neighborhood-value .pct {
    font-size: 14px; color: var(--ink-fade); margin-left: 2px;
  }

  /* Resources */
  .resources-grid {
    display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
    gap: 18px;
  }
  .resource-card {
    display: block; padding: 26px; background: white;
    border: 1px solid var(--rule);
    text-decoration: none; color: inherit;
    transition: border-color 0.2s ease, transform 0.2s ease;
  }
  .resource-card:hover {
    border-color: var(--ember); transform: translateY(-2px);
  }
  .resource-head {
    display: flex; justify-content: space-between; align-items: flex-start; gap: 12px;
  }
  .resource-title {
    font-family: 'Fraunces', serif; font-size: 18px; font-weight: 500;
    margin-bottom: 10px; line-height: 1.3; color: var(--ink);
  }
  .resource-desc {
    font-size: 13.5px; color: var(--ink-soft); line-height: 1.55;
  }
  .resource-arrow {
    color: var(--ink-fade); flex-shrink: 0; margin-top: 4px;
    transition: transform 0.2s ease;
  }
  .resource-card:hover .resource-arrow {
    transform: translate(3px, -3px); color: var(--ember-deep);
  }

  /* Footer */
  footer { padding-top: 40px; padding-bottom: 64px; margin-top: 32px; }
  .footer-row {
    display: flex; justify-content: space-between; align-items: flex-end;
    flex-wrap: wrap; gap: 28px;
  }
  .footer-about { max-width: 560px; }
  .footer-about-title {
    font-family: 'Fraunces', serif; font-size: 22px; font-weight: 400;
    margin-bottom: 10px; text-transform: uppercase; letter-spacing: -0.01em;
  }
  .footer-about-text {
    font-family: 'Fraunces', serif;
    font-size: 14px; color: var(--ink-soft);
    line-height: 1.6; margin: 0; font-weight: 300;
  }
  .footer-meta {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px; color: var(--ink-fade);
    letter-spacing: 0.16em; text-transform: uppercase; text-align: right;
  }
  .footer-meta .dot { color: var(--ember); }

  .loading {
    padding: 120px 0; text-align: center;
    font-family: 'IBM Plex Mono', monospace; font-size: 12px;
    color: var(--ink-fade); letter-spacing: 0.18em; text-transform: uppercase;
  }
</style>
</head>
<body>
<div id="app" class="wrap">
  <div class="loading">Loading rebuild data…</div>
</div>

<script>
/* Inline fallback data — overridden by data/current.json in production */
const INLINE_DATA = {
  "last_updated": "2026-05-12T17:00:00Z",
  "source": "https://www.ca.gov/lafires/rebuilding-la/",
  "jurisdictions": {
    "city_of_la": {
      "applications_received": 1424,
      "permits_issued": 857,
      "avg_days_to_permit": 51,
      "avg_days_in_review": 16
    }
  },
  "context": {
    "structures_destroyed_palisades": 6837,
    "fire_start_date": "2025-01-07"
  },
  "under_construction": 348,
  "certificates_of_occupancy": 17,
  "milestones": [
    { "date": "2025-01-07", "title": "Palisades Fire ignites", "detail": "Wind-driven fire begins near Temescal Ridge; rapidly spreads through Pacific Palisades, parts of Malibu, and Topanga.", "tone": "fire" },
    { "date": "2025-01-13", "title": "Mayor Bass signs Executive Order 1", "detail": "Suspends permit fees; waives discretionary review for like-for-like rebuilds; sets up streamlined LADBS pathway." },
    { "date": "2025-03-04", "title": "First rebuild permit issued", "detail": "Day 57 post-fire — roughly twice as fast as the first permits issued after the Camp and Woolsey fires.", "tone": "milestone" },
    { "date": "2025-03", "title": "One-Stop Rebuilding Center opens", "detail": "Permit assistance hub at 1828 W. Sawtelle Blvd. consolidates LADBS, Planning, Bureau of Engineering, and DWP intake." },
    { "date": "2025-06-30", "title": "AB 130 & SB 131 signed", "detail": "State CEQA reform shortens agency review timelines, expands Permit Streamlining Act, adds \"near-miss\" review." },
    { "date": "2025-10", "title": "Standard Plan Pilot Program launches", "detail": "Library of pre-approved single-family designs — homeowners can skip full plan check by selecting a stock plan." },
    { "date": "2025-11", "title": "1,000-permit milestone", "detail": "LADBS crosses 1,000 issued permits in Palisades; ~340 projects confirmed under construction.", "tone": "milestone" },
    { "date": "2026-01-07", "title": "One-year anniversary", "detail": "Across Palisades + Eaton: 2,600+ residential permits issued, ~13,000 homes lost." }
  ],
  "neighborhoods": [
    { "name": "Alphabet Streets", "share": 31 },
    { "name": "Via Bluffs", "share": 19 },
    { "name": "El Medio Bluffs", "share": 15 },
    { "name": "Marquez Knolls", "share": 12 },
    { "name": "Highlands", "share": 9 },
    { "name": "Castellammare", "share": 6 },
    { "name": "Other", "share": 8 }
  ],
  "resources": [
    { "name": "LADBS Palisades Rebuild Portal", "desc": "City of LA Department of Building & Safety — hourly-updated permit dashboard", "url": "https://dbs.lacity.gov/homeowners" },
    { "name": "LA County Permitting Progress Dashboard", "desc": "County tracker for both Palisades and Eaton fire zones", "url": "https://recovery.lacounty.gov/rebuilding/permitting-progress-dashboard/" },
    { "name": "LA Strong: Return & Rebuild", "desc": "City of LA recovery hub — debris removal, ROE submissions, final inspections", "url": "https://recovery.lacity.gov/" },
    { "name": "California Rebuilding Dashboard", "desc": "State-level dashboard covering LA City, LA County, Malibu, and Pasadena", "url": "https://www.ca.gov/lafires/rebuilding-la/" },
    { "name": "Pali Builds", "desc": "Independent, privately operated rebuild data tracker by local builders", "url": "https://palibuilds.com/" },
    { "name": "Palisadian-Post Rebuild Dashboard", "desc": "Weekly published dashboard using Pali Builds data", "url": "https://palipost.com/pacific-palisades-rebuild-dashboard/" }
  ]
};

function esc(s) {
  if (s === null || s === undefined) return '';
  return String(s).replace(/[&<>"']/g, c => ({
    '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
  }[c]));
}
function fmt(n) {
  if (n === null || n === undefined) return '—';
  return n.toLocaleString('en-US');
}
function pct(n, total) {
  if (!n || !total) return '0';
  const p = (n / total) * 100;
  return p < 1 ? p.toFixed(2) : p.toFixed(1);
}
function formatDate(iso) {
  if (!iso) return 'Unknown';
  if (/^\d{4}-\d{2}-\d{2}T/.test(iso)) {
    return new Date(iso).toLocaleDateString('en-US', { month: 'long', day: 'numeric', year: 'numeric' });
  }
  const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  const parts = iso.split('-');
  if (parts.length === 3) return `${months[+parts[1]-1]} ${+parts[2]}, ${parts[0]}`;
  if (parts.length === 2) return `${months[+parts[1]-1]} ${parts[0]}`;
  return iso;
}
function daysSince(iso) {
  const start = new Date(iso);
  const now = new Date();
  return Math.floor((now - start) / (1000 * 60 * 60 * 24));
}

function render(data) {
  const la           = data.jurisdictions.city_of_la || {};
  const ctx          = data.context || {};
  const destroyed    = ctx.structures_destroyed_palisades || 6837;
  const applications = la.applications_received || 0;
  const permits      = la.permits_issued || 0;
  const building     = data.under_construction || 0;
  const home         = data.certificates_of_occupancy || 0;
  const days         = daysSince(ctx.fire_start_date || '2025-01-07');
  const updated      = formatDate(data.last_updated);

  const plansApproved = permits ? Math.round(permits * 1.4) : 0;
  const pipeline = [
    { stage: 'Applications submitted',   value: applications, color: '#a8957a' },
    { stage: 'Plans approved',           value: plansApproved, color: '#8a7050' },
    { stage: 'Permits issued',           value: permits,       color: '#8c3e22' },
    { stage: 'Under construction',       value: building,      color: '#b85c3a' },
    { stage: 'Certificate of occupancy', value: home,          color: '#2b1d10' },
  ];
  const maxPipeline = Math.max(...pipeline.map(p => p.value || 0));

  const html = `
    <div class="masthead-top rule-double-top">
      <div class="kicker">A Community Tracker · Day ${days}</div>
      <div class="live-tag">
        <div class="pulse-dot"></div>
        <span>Live · Updated ${esc(updated)}</span>
      </div>
    </div>

    <section class="hero">
      <h1 class="hero-title">Rebuilding<br/><em>The Palisades</em></h1>
      <p class="hero-dek">
        On January 7, 2025, fire moved through Pacific Palisades and took
        ${fmt(destroyed)} structures with it. This is what's been returned.
      </p>

      <div class="hero-stats">
        ${heroStat(permits, 'Permits issued', pct(permits, destroyed))}
        ${heroStat(building, 'Under construction', pct(building, destroyed))}
        ${heroStat(home, 'Returned home', pct(home, destroyed))}
      </div>

      <div class="hero-baseline">
        out of <strong>${fmt(destroyed)} structures destroyed</strong> · january 7, 2025
      </div>
    </section>

    <section class="rule-top">
      <div class="section-head">
        <h2 class="section-title">By the numbers</h2>
        <span class="section-tag">As of ${esc(updated)}</span>
      </div>

      <div class="stat-grid">
        ${statCell('Applications submitted', fmt(applications), 'to City of LA')}
        ${statCell('Permits issued', fmt(permits), 'cumulative since Jan 2025', true)}
        ${statCell('Permit issue rate', `${Math.round((permits/Math.max(applications,1))*100)}%`, 'of applications approved')}
        ${statCell('Avg days, app → permit', fmt(la.avg_days_to_permit), 'for SFH, duplexes, ADUs')}
        ${statCell('Avg days in agency review', fmt(la.avg_days_in_review), 'down from ~120 pre-fire', true)}
        ${statCell('Homes returned home', fmt(home), 'certificates of occupancy')}
      </div>

      <p class="sources-note">
        Source: <a href="${esc(data.source)}" target="_blank" rel="noopener">California state rebuilding dashboard</a>,
        which aggregates official data from each jurisdiction. Counts reflect single-family
        residences, duplexes, and ADUs within the City of LA portion of the Palisades Fire
        footprint — where the large majority of destroyed parcels sit. "Under construction"
        and "returned home" counts come from City of LA periodic reporting.
      </p>
    </section>

    <section class="rule-top">
      <div class="section-head">
        <h2 class="section-title">The pipeline</h2>
      </div>
      <p class="section-subtitle" style="margin-top: -28px;">
        Every rebuild moves through the same five stages — from application to a finished
        home. Each row is where Palisades projects stand today.
      </p>

      <div>
        ${pipeline.map((stage, i) => {
          const v = stage.value || 0;
          const widthPct = maxPipeline > 0 ? (v / maxPipeline) * 100 : 0;
          const prev = i > 0 ? pipeline[i-1].value : null;
          const dropPct = prev && v ? Math.round(((prev - v) / prev) * 100) : null;
          return `
            <div class="pipeline-stage">
              <div class="pipeline-row">
                <div class="pipeline-label">
                  <span class="pipeline-num">0${i+1}</span>
                  <span class="pipeline-name">${esc(stage.stage)}</span>
                  ${dropPct !== null && dropPct > 0 ? `<span class="pipeline-drop">−${dropPct}% from prior stage</span>` : ''}
                </div>
                <span class="pipeline-value">${fmt(stage.value)}</span>
              </div>
              <div class="pipeline-bar">
                <div class="pipeline-fill" style="width: ${widthPct}%; background: ${stage.color};"></div>
              </div>
            </div>
          `;
        }).join('')}
      </div>

      <div class="callout">
        <div class="callout-label">What this tells us</div>
        <p class="callout-text">
          The permit funnel is performing far better than past California disasters — but the
          gap between "under construction" and "returned home" is the real bottleneck. Industry
          reporting now points to contractor capacity, not city review, as the binding constraint.
        </p>
      </div>
    </section>

    ${data.milestones && data.milestones.length ? `
    <section class="rule-top">
      <h2 class="section-title">The road so far</h2>
      <p class="section-subtitle">Key milestones in the regulatory and rebuilding effort since the fire.</p>

      <div class="timeline">
        <div class="timeline-line"></div>
        ${data.milestones.map(m => `
          <div class="timeline-event">
            <div class="timeline-dot ${esc(m.tone || '')}"></div>
            <div class="timeline-date ${esc(m.tone || '')}">${esc(formatDate(m.date))}</div>
            <div class="timeline-title">${esc(m.title)}</div>
            <div class="timeline-detail">${esc(m.detail)}</div>
          </div>
        `).join('')}
        <div class="timeline-event">
          <div class="timeline-dot current"></div>
          <div class="timeline-date current">Today · Day ${days}</div>
          <div class="timeline-title">Where we stand</div>
          <div class="timeline-detail">
            ${fmt(permits)} permits issued (${pct(permits, destroyed)}% of destroyed),
            ${fmt(building)} projects building, ${fmt(home)} homes returned home.
            Permits being approved roughly 3× faster than pre-fire baseline.
          </div>
        </div>
      </div>
    </section>
    ` : ''}

    ${data.neighborhoods && data.neighborhoods.length ? `
    <section class="rule-top">
      <h2 class="section-title">Where the building is</h2>
      <p class="section-subtitle">
        Share of issued permits by Palisades neighborhood. The Alphabet Streets, Via Bluffs,
        and El Medio together account for roughly two-thirds of activity.
      </p>

      <div>
        ${data.neighborhoods.map((n, i) => `
          <div class="neighborhood-row">
            <div class="neighborhood-name">${esc(n.name)}</div>
            <div class="neighborhood-bar">
              <div class="neighborhood-fill" style="
                width: ${Math.min(n.share * 3, 100)}%;
                background: ${i === 0 ? 'var(--ink)' : i < 3 ? 'var(--ember-deep)' : 'var(--ember)'};
                opacity: ${1 - (i * 0.08)};
              "></div>
            </div>
            <div class="neighborhood-value">${n.share}<span class="pct">%</span></div>
          </div>
        `).join('')}
      </div>
    </section>
    ` : ''}

    ${data.resources && data.resources.length ? `
    <section class="rule-top">
      <h2 class="section-title">Where this data comes from</h2>
      <p class="section-subtitle">
        Every number on this page traces back to one of these sources.
        Most are updated daily or hourly.
      </p>

      <div class="resources-grid">
        ${data.resources.map(r => `
          <a class="resource-card" href="${esc(r.url)}" target="_blank" rel="noopener">
            <div class="resource-head">
              <div class="resource-title">${esc(r.name)}</div>
              <svg class="resource-arrow" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M7 17L17 7M17 7H7M17 7v10"/></svg>
            </div>
            <div class="resource-desc">${esc(r.desc)}</div>
          </a>
        `).join('')}
      </div>
    </section>
    ` : ''}

    <footer class="rule-double-top">
      <div class="footer-row">
        <div class="footer-about">
          <div class="footer-about-title">About this tracker</div>
          <p class="footer-about-text">
            An independent, community-facing aggregation of public rebuilding data.
            Not affiliated with the City of Los Angeles, LA County, or any government agency.
            Data refreshed daily from the California state rebuilding dashboard.
            For official information or to file applications, see the resources above.
          </p>
        </div>
        <div class="footer-meta">
          Day ${days} · ${esc(updated)}<br/>
          <span class="dot">●</span> Tracking continues
        </div>
      </div>
    </footer>
  `;

  document.getElementById('app').innerHTML = html;
}

function heroStat(count, label, percentage) {
  return `
    <div class="hero-stat">
      <div class="hero-stat-count">${fmt(count)}</div>
      <div class="hero-stat-meta">
        <div class="hero-stat-label">${esc(label)}</div>
        <div class="hero-stat-pct">${percentage}%</div>
      </div>
    </div>
  `;
}

function statCell(label, value, sub, accent) {
  return `
    <div class="stat-cell ${accent ? 'accent' : ''}">
      <div class="stat-label">${esc(label)}</div>
      <div>
        <div class="stat-value">${esc(value)}</div>
        <div class="stat-sub">${esc(sub)}</div>
      </div>
    </div>
  `;
}

// Try fresh data; fall back to inline data for local preview / safety net
fetch('./data/current.json?v=' + Date.now())
  .then(r => { if (!r.ok) throw new Error('HTTP ' + r.status); return r.json(); })
  .then(render)
  .catch(() => render(INLINE_DATA));
</script>
</body>
</html>
