<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Rebuilding the Palisades — A Community Tracker</title>
<meta name="description" content="A community tracker for Pacific Palisades fire rebuild permits, construction, and milestones. Sourced daily from official LA City, LA County, and California state dashboards." />

<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,200..800&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet" />

<style>
  /* Palette: Caruso-inspired navy + white + warm gold accent */
  :root {
    --paper:       #ffffff;
    --paper-deep:  #f4f5f8;
    --ink:         #1c2e4f;
    --ink-soft:    #4a5a72;
    --ink-fade:    #8a96a8;
    --rule:        #d9dde5;
    --ember:       #b08d57;
    --ember-deep:  #8c6d3f;
  }

  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    background: var(--paper);
    color: var(--ink);
    font-family: 'Bricolage Grotesque', system-ui, sans-serif;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
  }
  a { color: inherit; }

  .wrap { max-width: 1240px; margin: 0 auto; padding: 0 40px; }
  @media (max-width: 700px) { .wrap { padding: 0 22px; } }

  .font-display { font-family: 'Bricolage Grotesque', Georgia, serif; font-optical-sizing: auto; }
  .font-body    { font-family: 'Bricolage Grotesque', sans-serif; }
  .font-mono    { font-family: 'IBM Plex Mono', ui-monospace, monospace; }

  .kicker {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px; letter-spacing: 0.22em; text-transform: uppercase;
    color: var(--ink-fade);
  }

  .rule-top { border-top: 1px solid var(--rule); }
  .rule-double-top {
    background-image: linear-gradient(to bottom, var(--ink) 0, var(--ink) 1px, transparent 1px, transparent 4px, var(--ink) 4px, var(--ink) 5px, transparent 5px);
    background-size: 100% 5px; background-repeat: no-repeat; background-position: top;
    padding-top: 14px;
  }

  /* Masthead */
  .masthead-top {
    display: flex; justify-content: space-between; align-items: center;
    padding-top: 28px; padding-bottom: 60px; gap: 20px; flex-wrap: wrap;
  }
  .pulse-dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: var(--ember);
    box-shadow: 0 0 0 0 rgba(176, 141, 87, 0.6);
    animation: pulse 2s infinite; flex-shrink: 0;
  }
  @keyframes pulse {
    0%   { box-shadow: 0 0 0 0 rgba(176, 141, 87, 0.6); }
    70%  { box-shadow: 0 0 0 12px rgba(176, 141, 87, 0); }
    100% { box-shadow: 0 0 0 0 rgba(176, 141, 87, 0); }
  }
  .live-tag {
    display: flex; align-items: center; gap: 8px;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px; letter-spacing: 0.18em; text-transform: uppercase;
    color: var(--ember-deep);
  }

  /* HERO */
  .hero { padding-bottom: 80px; padding-top: 0; }
  .hero-title {
    font-family: 'Bricolage Grotesque', serif;
    font-size: clamp(64px, 11vw, 168px);
    line-height: 0.88;
    font-weight: 500;
    letter-spacing: -0.025em;
    text-transform: uppercase;
    font-variation-settings: "opsz" 144;
    margin: 0 0 36px 0;
    color: var(--ink);
  }
  .hero-title em {
    font-style: italic;
    font-weight: 500;
    color: var(--ink);
  }
  .hero-dek {
    font-family: 'Bricolage Grotesque', serif;
    font-size: clamp(17px, 1.6vw, 21px);
    line-height: 1.5; max-width: 640px;
    font-weight: 400; color: var(--ink-soft);
    margin: 0 0 80px 0;
  }

  .hero-stats {
    display: grid; grid-template-columns: repeat(3, 1fr);
    gap: 1px; background: var(--rule);
    border-top: 1px solid var(--rule); border-bottom: 1px solid var(--rule);
  }
  @media (max-width: 720px) { .hero-stats { grid-template-columns: 1fr; } }
  .hero-stat {
    background: var(--paper);
    padding: 44px 32px 38px;
    display: flex; flex-direction: column;
    min-height: 240px; justify-content: space-between;
  }
  .hero-stat-count {
    font-family: 'Bricolage Grotesque', serif;
    font-size: clamp(72px, 10vw, 140px);
    line-height: 0.85; font-weight: 500;
    letter-spacing: -0.04em;
    font-variation-settings: "opsz" 144;
    color: var(--ink);
  }
  .hero-stat-meta {
    display: flex; align-items: baseline; justify-content: space-between;
    margin-top: 24px; gap: 16px;
  }
  .hero-stat-label {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 12px; letter-spacing: 0.2em; text-transform: uppercase;
    color: var(--ink-fade);
  }
  .hero-stat-pct {
    font-family: 'Bricolage Grotesque', serif;
    font-size: clamp(34px, 3.4vw, 42px);
    font-weight: 400; letter-spacing: -0.02em;
    color: var(--ember-deep);
    font-variation-settings: "opsz" 144;
  }

  .hero-baseline {
    margin-top: 28px;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 12px; letter-spacing: 0.16em;
    text-transform: uppercase; color: var(--ink-fade);
    text-align: center;
  }
  .hero-baseline strong { color: var(--ink); font-weight: 500; }

  /* Sections */
  section { padding-top: 64px; padding-bottom: 64px; }
  .section-head {
    display: flex; align-items: baseline; justify-content: space-between;
    margin-bottom: 36px; gap: 20px; flex-wrap: wrap;
  }
  h2.section-title {
    font-family: 'Bricolage Grotesque', serif;
    font-size: clamp(32px, 3.5vw, 44px);
    font-weight: 600; margin: 0;
    letter-spacing: -0.015em; text-transform: uppercase;
    color: var(--ink);
  }
  .section-subtitle {
    font-family: 'Bricolage Grotesque', serif;
    font-size: 17px; color: var(--ink-soft);
    max-width: 640px; line-height: 1.55;
    margin: 0 0 40px 0; font-weight: 400;
  }
  .section-tag {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px; color: var(--ink-fade);
    text-transform: uppercase; letter-spacing: 0.16em;
  }

  /* Detail stat grid — explicit 3 columns, then 2, then 1 */
  .stat-grid {
    display: grid; grid-template-columns: repeat(3, 1fr);
    gap: 1px; background: var(--rule);
    border: 1px solid var(--rule);
  }
  @media (max-width: 800px) { .stat-grid { grid-template-columns: repeat(2, 1fr); } }
  @media (max-width: 500px) { .stat-grid { grid-template-columns: 1fr; } }
  .stat-cell {
    background: var(--paper); padding: 30px 26px; min-height: 150px;
    display: flex; flex-direction: column; justify-content: space-between;
  }
  .stat-cell.accent { background: var(--paper-deep); }
  .stat-label {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10.5px; letter-spacing: 0.18em; text-transform: uppercase;
    color: var(--ink-fade); margin-bottom: 14px;
  }
  .stat-cell.accent .stat-label { color: var(--ember-deep); }
  .stat-value {
    font-family: 'Bricolage Grotesque', serif;
    font-size: clamp(38px, 4.2vw, 52px);
    font-weight: 400; letter-spacing: -0.02em; line-height: 1;
    font-variation-settings: "opsz" 144;
  }
  .stat-sub {
    font-size: 12.5px; color: var(--ink-fade); margin-top: 8px;
    font-style: italic; font-family: 'Bricolage Grotesque', serif;
  }
  .sources-note {
    font-size: 13px; color: var(--ink-fade);
    margin-top: 24px; line-height: 1.6;
  }
  .sources-note a { color: var(--ember-deep); text-underline-offset: 3px; }

  /* Pipeline */
  .pipeline-stage { margin-bottom: 14px; }
  .pipeline-row {
    display: flex; justify-content: space-between; align-items: baseline;
    margin-bottom: 8px; gap: 16px; flex-wrap: wrap;
  }
  .pipeline-label { display: flex; align-items: center; gap: 14px; flex-wrap: wrap; }
  .pipeline-num {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px; color: var(--ink-fade); width: 24px;
  }
  .pipeline-name { font-size: 15px; font-weight: 500; color: var(--ink); }
  .pipeline-drop {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px; color: var(--ember-deep); letter-spacing: 0.06em;
  }
  .pipeline-value {
    font-family: 'Bricolage Grotesque', serif;
    font-weight: 400; font-size: 26px; letter-spacing: -0.02em;
  }
  .pipeline-bar { height: 10px; background: var(--paper-deep); position: relative; }
  .pipeline-fill { height: 100%; transition: width 1s ease; }

  .callout {
    margin-top: 36px; padding: 24px 28px;
    background: var(--paper-deep);
    border-left: 3px solid var(--ember);
  }
  .callout-label {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px; letter-spacing: 0.18em; text-transform: uppercase;
    color: var(--ember-deep); margin-bottom: 10px;
  }
  .callout-text {
    font-family: 'Bricolage Grotesque', serif;
    font-size: 16px; line-height: 1.6; margin: 0;
    font-weight: 400; color: var(--ink);
  }

  /* Timeline */
  .timeline { position: relative; padding-left: 38px; }
  .timeline-line {
    position: absolute; left: 7px; top: 4px; bottom: 4px;
    width: 1px; background: var(--rule);
  }
  .timeline-event { position: relative; padding-bottom: 36px; }
  .timeline-dot {
    position: absolute; left: -38px; top: 8px;
    width: 15px; height: 15px; border-radius: 50%;
    background: var(--paper); border: 2px solid var(--ink-fade);
  }
  .timeline-dot.fire      { background: var(--ink); border-color: var(--ink); }
  .timeline-dot.milestone { background: var(--paper-deep); border-color: var(--ember); }
  .timeline-dot.current {
    background: var(--ember); border-color: var(--ember);
    box-shadow: 0 0 0 5px rgba(176, 141, 87, 0.18);
  }
  .timeline-date {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px; letter-spacing: 0.16em; text-transform: uppercase;
    color: var(--ink-fade); margin-bottom: 6px;
  }
  .timeline-date.current { color: var(--ember-deep); }
  .timeline-title {
    font-family: 'Bricolage Grotesque', serif;
    font-size: 22px; font-weight: 400; margin-bottom: 8px;
    letter-spacing: -0.01em; color: var(--ink);
  }
  .timeline-detail {
    font-family: 'Bricolage Grotesque', serif;
    font-size: 16px; color: var(--ink-soft);
    line-height: 1.6; max-width: 700px; font-weight: 400;
  }

  /* Neighborhood bars */
  .neighborhood-row {
    display: flex; align-items: center; gap: 22px; margin-bottom: 16px;
  }
  .neighborhood-name {
    width: 180px; font-size: 15px; font-weight: 500;
    flex-shrink: 0; color: var(--ink);
  }
  .neighborhood-bar {
    flex: 1; height: 28px; background: var(--paper-deep);
    position: relative; min-width: 80px;
  }
  .neighborhood-fill { height: 100%; transition: width 1.2s ease; }
  .neighborhood-value {
    font-family: 'Bricolage Grotesque', serif; font-weight: 400; font-size: 24px;
    width: 70px; text-align: right; letter-spacing: -0.02em;
    color: var(--ink); white-space: nowrap;
  }
  .neighborhood-value .pct {
    font-size: 14px; color: var(--ink-fade); margin-left: 2px;
  }

  /* Methodology — how we count */
  .methodology {
    display: grid; gap: 1px;
    background: var(--rule);
    border: 1px solid var(--rule);
  }
  .method-row {
    background: var(--paper);
    padding: 28px 30px;
    display: grid;
    grid-template-columns: 280px 1fr;
    gap: 32px;
    align-items: start;
  }
  @media (max-width: 700px) {
    .method-row { grid-template-columns: 1fr; gap: 12px; padding: 24px; }
  }
  .method-label {
    font-family: 'Bricolage Grotesque', serif;
    font-size: 19px; font-weight: 500;
    margin-bottom: 6px; color: var(--ink);
    letter-spacing: -0.005em;
  }
  .method-cadence {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px; letter-spacing: 0.16em; text-transform: uppercase;
    color: var(--ember-deep);
  }
  .method-detail {
    font-family: 'Bricolage Grotesque', serif;
    font-size: 16px; line-height: 1.6;
    color: var(--ink-soft); font-weight: 400;
  }

  /* Business Watch — curated commercial tracker */
  .biz-grid {
    display: grid; grid-template-columns: repeat(3, 1fr);
    gap: 1px; background: var(--rule);
    border: 1px solid var(--rule);
  }
  @media (max-width: 900px) { .biz-grid { grid-template-columns: repeat(2, 1fr); } }
  @media (max-width: 560px) { .biz-grid { grid-template-columns: 1fr; } }
  .biz-card {
    background: var(--paper); padding: 24px 26px;
    display: flex; flex-direction: column; gap: 10px;
    text-decoration: none; color: inherit;
    transition: background 0.2s ease;
  }
  .biz-card:hover { background: var(--paper-deep); }
  .biz-status {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px; letter-spacing: 0.2em; text-transform: uppercase;
    align-self: flex-start;
    padding: 4px 10px;
    border: 1px solid currentColor;
  }
  .biz-status.open       { color: var(--ember-deep); }
  .biz-status.rebuilding { color: var(--ink); }
  .biz-status.planning   { color: var(--ink-soft); }
  .biz-status.temporary  { color: #5a7a6e; }
  .biz-status.closed     { color: var(--ink-fade); }
  .biz-name {
    font-family: 'Bricolage Grotesque', serif;
    font-size: 19px; font-weight: 600;
    line-height: 1.25; color: var(--ink);
    letter-spacing: -0.005em;
  }
  .biz-meta {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px; color: var(--ink-fade);
    letter-spacing: 0.04em;
  }
  .biz-detail {
    font-family: 'Bricolage Grotesque', serif;
    font-size: 13.5px; line-height: 1.5;
    color: var(--ink-soft); font-weight: 400;
    margin-top: 2px;
  }
  .biz-date {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10.5px; letter-spacing: 0.12em;
    text-transform: uppercase; color: var(--ink-fade);
    margin-top: auto; padding-top: 6px;
  }

  /* Commercial section legend / status pills */
  .biz-legend {
    display: flex; gap: 18px; flex-wrap: wrap;
    margin-bottom: 28px;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px; letter-spacing: 0.14em; text-transform: uppercase;
  }
  .biz-legend-item { display: flex; align-items: center; gap: 8px; }
  .biz-legend-dot {
    width: 10px; height: 10px; border: 1.5px solid currentColor;
  }
  .biz-legend-item.open       { color: var(--ember-deep); }
  .biz-legend-item.rebuilding { color: var(--ink); }
  .biz-legend-item.planning   { color: var(--ink-soft); }
  .biz-legend-item.temporary  { color: #5a7a6e; }
  .biz-legend-item.closed     { color: var(--ink-fade); }

  /* Sticky site navigation */
  .site-nav {
    position: sticky; top: 0; z-index: 50;
    background: rgba(255, 255, 255, 0.94);
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    border-bottom: 1px solid var(--rule);
    margin: 0 -32px;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10.5px; letter-spacing: 0.18em; text-transform: uppercase;
  }
  .site-nav-inner {
    display: flex; gap: 28px; overflow-x: auto;
    padding: 14px 32px;
    -ms-overflow-style: none; scrollbar-width: none;
  }
  .site-nav-inner::-webkit-scrollbar { display: none; }
  .site-nav a {
    color: var(--ink-soft); text-decoration: none;
    white-space: nowrap;
    transition: color 0.15s ease;
  }
  .site-nav a:hover { color: var(--ember-deep); }
  /* offset anchor jumps so headings don't get hidden under sticky nav */
  section[id] { scroll-margin-top: 60px; }
  @media (max-width: 600px) {
    .site-nav { margin: 0 -20px; }
    .site-nav-inner { padding: 12px 20px; gap: 20px; }
  }

  /* Resources — explicit 3-col, then 2, then 1 (6 items = clean 3x2) */
  .resources-grid {
    display: grid; grid-template-columns: repeat(3, 1fr);
    gap: 18px;
  }
  @media (max-width: 800px) { .resources-grid { grid-template-columns: repeat(2, 1fr); } }
  @media (max-width: 500px) { .resources-grid { grid-template-columns: 1fr; } }
  .resource-card {
    display: block; padding: 26px; background: var(--paper);
    border: 1px solid var(--rule);
    text-decoration: none; color: inherit;
    transition: border-color 0.2s ease, transform 0.2s ease;
  }
  .resource-card:hover {
    border-color: var(--ember); transform: translateY(-2px);
  }
  .resource-head {
    display: flex; justify-content: space-between; align-items: flex-start; gap: 12px;
  }
  .resource-title {
    font-family: 'Bricolage Grotesque', serif; font-size: 18px; font-weight: 500;
    margin-bottom: 10px; line-height: 1.3; color: var(--ink);
  }
  .resource-desc {
    font-size: 13.5px; color: var(--ink-soft); line-height: 1.55;
  }
  .resource-meta {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px; letter-spacing: 0.04em;
    color: var(--ink-fade); margin-top: 10px;
    padding-top: 10px; border-top: 1px solid var(--rule);
  }
  .resource-arrow {
    color: var(--ink-fade); flex-shrink: 0; margin-top: 4px;
    transition: transform 0.2s ease;
  }
  .resource-card:hover .resource-arrow {
    transform: translate(3px, -3px); color: var(--ember-deep);
  }

  /* Footer */
  footer { padding-top: 40px; padding-bottom: 64px; margin-top: 32px; }
  .footer-row {
    display: flex; justify-content: space-between; align-items: flex-end;
    flex-wrap: wrap; gap: 28px;
  }
  .footer-about { max-width: 560px; }
  .footer-about-title {
    font-family: 'Bricolage Grotesque', serif; font-size: 22px; font-weight: 400;
    margin-bottom: 10px; text-transform: uppercase; letter-spacing: -0.01em;
  }
  .footer-about-text {
    font-family: 'Bricolage Grotesque', serif;
    font-size: 14px; color: var(--ink-soft);
    line-height: 1.6; margin: 0; font-weight: 400;
  }
  .footer-meta {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px; color: var(--ink-fade);
    letter-spacing: 0.16em; text-transform: uppercase; text-align: right;
  }
  .footer-meta .dot { color: var(--ember); }

  .loading {
    padding: 120px 0; text-align: center;
    font-family: 'IBM Plex Mono', monospace; font-size: 12px;
    color: var(--ink-fade); letter-spacing: 0.18em; text-transform: uppercase;
  }
</style>
</head>
<body>
<div id="app" class="wrap">
  <div class="loading">Loading rebuild data…</div>
</div>

<script>
/* Inline fallback data — overridden by data/current.json in production */
const INLINE_DATA = {
  "last_updated": "2026-05-15T17:00:00Z",
  "source": "https://www.ca.gov/lafires/rebuilding-la/",
  "jurisdictions": {
    "city_of_la": { "applications_received": 1424, "permits_issued": 857, "avg_days_to_permit": 51, "avg_days_in_review": 16 }
  },
  "under_construction": 348,
  "certificates_of_occupancy": 17,
  "context": { "structures_destroyed_palisades": 6837, "fire_start_date": "2025-01-07" },
  "milestones": [
    { "date": "2025-01-07", "title": "Palisades Fire ignites", "detail": "Wind-driven fire begins near Temescal Ridge; rapidly spreads through Pacific Palisades, parts of Malibu, and Topanga.", "tone": "fire" },
    { "date": "2025-03-04", "title": "First rebuild permit issued", "detail": "Day 57 post-fire — roughly twice as fast as the first permits issued after the Camp and Woolsey fires.", "tone": "milestone" },
    { "date": "2025-11", "title": "1,000-permit milestone", "detail": "LADBS crosses 1,000 issued permits in Palisades; ~340 projects confirmed under construction.", "tone": "milestone" }
  ],
  "neighborhoods": [
    { "name": "Alphabet Streets", "share": 31 }, { "name": "Via Bluffs", "share": 19 },
    { "name": "El Medio Bluffs", "share": 15 }, { "name": "Marquez Knolls", "share": 12 },
    { "name": "Highlands", "share": 9 }, { "name": "Castellammare", "share": 6 }, { "name": "Other", "share": 8 }
  ],
  "resources": []
};

function esc(s) {
  if (s === null || s === undefined) return '';
  return String(s).replace(/[&<>"']/g, c => ({
    '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
  }[c]));
}
function fmt(n) {
  if (n === null || n === undefined) return '—';
  return n.toLocaleString('en-US');
}
function pct(n, total) {
  if (!n || !total) return '0';
  const p = (n / total) * 100;
  return p < 1 ? p.toFixed(2) : p.toFixed(1);
}
function formatDate(iso) {
  if (!iso) return 'Unknown';
  if (/^\d{4}-\d{2}-\d{2}T/.test(iso)) {
    return new Date(iso).toLocaleDateString('en-US', { month: 'long', day: 'numeric', year: 'numeric' });
  }
  const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  const parts = iso.split('-');
  if (parts.length === 3) return `${months[+parts[1]-1]} ${+parts[2]}, ${parts[0]}`;
  if (parts.length === 2) return `${months[+parts[1]-1]} ${parts[0]}`;
  return iso;
}
function daysSince(iso) {
  const start = new Date(iso);
  const now = new Date();
  return Math.floor((now - start) / (1000 * 60 * 60 * 24));
}

function render(data) {
  const la           = data.jurisdictions.city_of_la || {};
  const ctx          = data.context || {};
  const destroyed    = ctx.structures_destroyed_palisades || 6837;
  const applications = la.applications_received || 0;
  const permits      = la.permits_issued || 0;
  const building     = data.under_construction || 0;
  const home         = data.certificates_of_occupancy || 0;
  const days         = daysSince(ctx.fire_start_date || '2025-01-07');
  const updated      = formatDate(data.last_updated);

  // Blue gradient: light → dark (dark = closer to "returned home" goal)
  const pipeline = [
    { stage: 'Applications submitted',   value: applications,                          color: '#c4cad6' },
    { stage: 'Plans approved',           value: permits ? Math.round(permits * 1.4) : 0, color: '#8a96a8' },
    { stage: 'Permits issued',           value: permits,                                color: '#b08d57' },
    { stage: 'Under construction',       value: building,                               color: '#4a5a72' },
    { stage: 'Certificate of occupancy', value: home,                                   color: '#1c2e4f' },
  ];
  const maxPipeline = Math.max(...pipeline.map(p => p.value || 0));

  // Navy gradient for neighborhood bars (darkest = largest share)
  const neighborhoodColors = ['#1c2e4f', '#354869', '#4a5a72', '#6c7d96', '#8a96a8', '#a3aebe', '#c4cad6'];

  const html = `
    <div class="masthead-top rule-double-top">
      <div class="kicker">A Community Tracker · Day ${days}</div>
      <div class="live-tag">
        <div class="pulse-dot"></div>
        <span>Live · Updated ${esc(updated)}</span>
      </div>
    </div>

    <nav class="site-nav" aria-label="Section navigation">
      <div class="site-nav-inner">
        <a href="#numbers">Numbers</a>
        <a href="#commercial">Commercial</a>
        <a href="#businesses">Businesses</a>
        <a href="#civic">Civic</a>
        <a href="#timeline">Timeline</a>
        <a href="#help">Get help</a>
        <a href="#sources">Sources</a>
      </div>
    </nav>

    <section class="hero">
      <h1 class="hero-title">Rebuilding<br/><em>The Palisades</em></h1>
      <p class="hero-dek">
        On January 7, 2025, fire moved through Pacific Palisades and took
        ${fmt(destroyed)} structures with it. This is what's been returned.
      </p>

      <div class="hero-stats">
        ${heroStat(permits, 'Permits issued', pct(permits, destroyed))}
        ${heroStat(building, 'Under construction', pct(building, destroyed))}
        ${heroStat(home, 'Returned home', pct(home, destroyed))}
      </div>

      <div class="hero-baseline">
        out of <strong>${fmt(destroyed)} structures destroyed</strong> · january 7, 2025
      </div>
    </section>

    <section id="numbers" class="rule-top">
      <div class="section-head">
        <h2 class="section-title">By the numbers</h2>
        <span class="section-tag">As of ${esc(updated)}</span>
      </div>

      <div class="stat-grid">
        ${statCell('Applications submitted', fmt(applications), 'to City of LA')}
        ${statCell('Permits issued', fmt(permits), 'cumulative since Jan 2025', true)}
        ${statCell('Permit issue rate', `${Math.round((permits/Math.max(applications,1))*100)}%`, 'of applications approved')}
        ${statCell('Avg days, app → permit', fmt(la.avg_days_to_permit), 'for SFH, duplexes, ADUs')}
        ${statCell('Avg days in agency review', fmt(la.avg_days_in_review), 'down from ~120 pre-fire', true)}
        ${statCell('Homes returned home', fmt(home), 'certificates of occupancy')}
      </div>

      <p class="sources-note">
        Source: <a href="${esc(data.source)}" target="_blank" rel="noopener">California state rebuilding dashboard</a>,
        which aggregates official data from each jurisdiction. Counts reflect single-family
        residences, duplexes, and ADUs within the City of LA portion of the Palisades Fire
        footprint — where the large majority of destroyed parcels sit. "Under construction"
        and "returned home" counts come from City of LA periodic reporting.
      </p>
    </section>

    <section id="pipeline" class="rule-top">
      <div class="section-head">
        <h2 class="section-title">The pipeline</h2>
      </div>
      <p class="section-subtitle" style="margin-top: -28px;">
        Every rebuild moves through the same five stages — from application to a finished
        home. Each row is where Palisades projects stand today.
      </p>

      <div>
        ${pipeline.map((stage, i) => {
          const v = stage.value || 0;
          const widthPct = maxPipeline > 0 ? (v / maxPipeline) * 100 : 0;
          const prev = i > 0 ? pipeline[i-1].value : null;
          const dropPct = prev && v ? Math.round(((prev - v) / prev) * 100) : null;
          return `
            <div class="pipeline-stage">
              <div class="pipeline-row">
                <div class="pipeline-label">
                  <span class="pipeline-num">0${i+1}</span>
                  <span class="pipeline-name">${esc(stage.stage)}</span>
                  ${dropPct !== null && dropPct > 0 ? `<span class="pipeline-drop">−${dropPct}% from prior stage</span>` : ''}
                </div>
                <span class="pipeline-value">${fmt(stage.value)}</span>
              </div>
              <div class="pipeline-bar">
                <div class="pipeline-fill" style="width: ${widthPct}%; background: ${stage.color};"></div>
              </div>
            </div>
          `;
        }).join('')}
      </div>

      <div class="callout">
        <div class="callout-label">What this tells us</div>
        <p class="callout-text">
          The permit funnel is performing far better than past California disasters — but the
          gap between "under construction" and "returned home" is the real bottleneck. Industry
          reporting now points to contractor capacity, not city review, as the binding constraint.
        </p>
      </div>
    </section>

    ${data.commercial ? `
    <section id="commercial" class="rule-top">
      <div class="section-head">
        <h2 class="section-title">Commercial recovery</h2>
        <span class="section-tag">As of ${esc(updated)}</span>
      </div>
      <p class="section-subtitle" style="margin-top: -28px;">
        Residential rebuilding gets the headlines, but the harder story is commercial. Nearly
        ${fmt(data.commercial.structures_damaged)} commercial structures were damaged in the fire,
        and of the ones fully destroyed, ${data.commercial.destroyed_rebuilt === 0 ? "<strong>none have been rebuilt yet.</strong>" : `${fmt(data.commercial.destroyed_rebuilt)} have been rebuilt.`}
        Below: the broad numbers, then a named-business tracker.
      </p>

      <div class="stat-grid" style="grid-template-columns: repeat(3, 1fr);">
        ${statCell('Commercial structures damaged', fmt(data.commercial.structures_damaged), 'Pacific Palisades footprint')}
        ${statCell('Commercial permits issued', fmt(data.commercial.permits_issued), 'incl. library, rec center, YMCA in planning', true)}
        ${statCell('Destroyed buildings rebuilt', fmt(data.commercial.destroyed_rebuilt), 'zero — first will likely be Gelson\\'s')}
      </div>

      <p class="sources-note">
        ${esc(data.commercial.as_of_note)}
        Commercial permit numbers are not on the state daily feed; they come from City Council
        and LADBS periodic reporting.
      </p>
    </section>
    ` : ''}

    ${data.businesses && data.businesses.length ? `
    <section id="businesses" class="rule-top">
      <h2 class="section-title">Business watch</h2>
      <p class="section-subtitle">
        A curated tracker of named businesses outside Palisades Village — the everyday
        infrastructure of pharmacies, groceries, restaurants, and hardware stores that
        determines whether the Palisades is functionally a neighborhood again.
      </p>

      <div class="biz-legend">
        ${['open','rebuilding','planning','closed'].map(s => `
          <div class="biz-legend-item ${s}">
            <div class="biz-legend-dot"></div>
            <span>${s === 'open' ? 'Open' : s === 'rebuilding' ? 'Rebuilding' : s === 'planning' ? 'Planning return' : 'Will not return'}</span>
          </div>
        `).join('')}
      </div>

      <div class="biz-grid">
        ${data.businesses.map(b => {
          const statusLabel = b.status === 'open' ? 'Open' :
                              b.status === 'rebuilding' ? 'Rebuilding' :
                              b.status === 'planning' ? 'Planning' :
                              b.status === 'closed' ? 'Not returning' : 'Unknown';
          const dateLabel = b.status_date
            ? (b.status === 'open' ? `Reopened ${formatDate(b.status_date)}`
              : b.status === 'rebuilding' ? `Updated ${formatDate(b.status_date)}`
              : b.status === 'planning' ? `Target ${formatDate(b.status_date)}`
              : `${formatDate(b.status_date)}`)
            : '';
          const inner = `
            <div class="biz-status ${esc(b.status)}">${esc(statusLabel)}</div>
            <div class="biz-name">${esc(b.name)}</div>
            <div class="biz-meta">${esc(b.category)} · ${esc(b.address)}</div>
            <div class="biz-detail">${esc(b.detail)}</div>
            ${dateLabel ? `<div class="biz-date">${esc(dateLabel)}</div>` : ''}
          `;
          return b.url
            ? `<a class="biz-card" href="${esc(b.url)}" target="_blank" rel="noopener">${inner}</a>`
            : `<div class="biz-card">${inner}</div>`;
        }).join('')}
      </div>

      <p class="sources-note">
        Status updates come from public reporting (Palisadian-Post, CoStar, Palisades News,
        LAist, business announcements). This is not exhaustive — it tracks the businesses
        residents most commonly ask about. To suggest additions, see the about section below.
      </p>
    </section>
    ` : ''}

    ${data.civic_infrastructure && data.civic_infrastructure.length ? `
    <section id="civic" class="rule-top">
      <h2 class="section-title">Civic infrastructure</h2>
      <p class="section-subtitle">
        The schools, library, recreation center, and YMCA that make a neighborhood
        functional for families. Many of these took the hardest direct hits in the fire,
        and several have committed funding paths to permanent rebuilds.
      </p>

      <div class="biz-legend">
        ${['open','temporary','rebuilding','planning'].map(s => `
          <div class="biz-legend-item ${s}">
            <div class="biz-legend-dot"></div>
            <span>${s === 'open' ? 'Back online' : s === 'temporary' ? 'Temporary facility' : s === 'rebuilding' ? 'Rebuilding' : 'Planning'}</span>
          </div>
        `).join('')}
      </div>

      <div class="biz-grid">
        ${data.civic_infrastructure.map(c => {
          const statusLabel = c.status === 'open' ? 'Back online' :
                              c.status === 'temporary' ? 'Temporary site' :
                              c.status === 'rebuilding' ? 'Rebuilding' :
                              c.status === 'planning' ? 'Planning' : 'Unknown';
          const dateLabel = c.status_date
            ? (c.status === 'open' ? `Operational ${formatDate(c.status_date)}`
              : c.status === 'temporary' ? `Temporary since ${formatDate(c.status_date)}`
              : c.status === 'rebuilding' ? `Ground broken ${formatDate(c.status_date)}`
              : `Target ${formatDate(c.status_date)}`)
            : '';
          const inner = `
            <div class="biz-status ${esc(c.status)}">${esc(statusLabel)}</div>
            <div class="biz-name">${esc(c.name)}</div>
            <div class="biz-meta">${esc(c.category)} · ${esc(c.address)}</div>
            <div class="biz-detail">${esc(c.detail)}</div>
            ${dateLabel ? `<div class="biz-date">${esc(dateLabel)}</div>` : ''}
          `;
          return c.url
            ? `<a class="biz-card" href="${esc(c.url)}" target="_blank" rel="noopener">${inner}</a>`
            : `<div class="biz-card">${inner}</div>`;
        }).join('')}
      </div>

      <p class="sources-note">
        Statuses sourced from LA Mayor's office, LAUSD, Palisades News, and institutional
        press releases. Two of three Palisades schools remain in temporary facilities;
        permanent campuses are scheduled for 2028 as part of a $604M LAUSD project.
      </p>
    </section>
    ` : ''}

    ${data.milestones && data.milestones.length ? `
    <section id="timeline" class="rule-top">
      <h2 class="section-title">The road so far</h2>
      <p class="section-subtitle">Key milestones in the regulatory and rebuilding effort since the fire.</p>

      <div class="timeline">
        <div class="timeline-line"></div>
        ${data.milestones.map(m => `
          <div class="timeline-event">
            <div class="timeline-dot ${esc(m.tone || '')}"></div>
            <div class="timeline-date ${esc(m.tone || '')}">${esc(formatDate(m.date))}</div>
            <div class="timeline-title">${esc(m.title)}</div>
            <div class="timeline-detail">${esc(m.detail)}</div>
          </div>
        `).join('')}
        <div class="timeline-event">
          <div class="timeline-dot current"></div>
          <div class="timeline-date current">Today · Day ${days}</div>
          <div class="timeline-title">Where we stand</div>
          <div class="timeline-detail">
            ${fmt(permits)} permits issued (${pct(permits, destroyed)}% of destroyed),
            ${fmt(building)} projects building, ${fmt(home)} homes returned home.
            Permits being approved roughly 3× faster than pre-fire baseline.
          </div>
        </div>
      </div>
    </section>
    ` : ''}

    ${data.neighborhoods && data.neighborhoods.length ? `
    <section id="neighborhoods" class="rule-top">
      <h2 class="section-title">Where the building is</h2>
      <p class="section-subtitle">
        Share of issued permits by Palisades neighborhood. The Alphabet Streets, Via Bluffs,
        and El Medio together account for roughly two-thirds of activity.
      </p>

      <div>
        ${data.neighborhoods.map((n, i) => `
          <div class="neighborhood-row">
            <div class="neighborhood-name">${esc(n.name)}</div>
            <div class="neighborhood-bar">
              <div class="neighborhood-fill" style="
                width: ${Math.min(n.share * 3, 100)}%;
                background: ${neighborhoodColors[i] || '#c4cad6'};
              "></div>
            </div>
            <div class="neighborhood-value">${n.share}<span class="pct">%</span></div>
          </div>
        `).join('')}
      </div>
    </section>
    ` : ''}

    ${data.help_resources && data.help_resources.length ? `
    <section id="help" class="rule-top">
      <h2 class="section-title">Get help</h2>
      <p class="section-subtitle">
        If you're a Palisades resident navigating the rebuild process — or helping
        someone who is — these are the resources that actually move things forward.
        Permit centers, AI plan-check tools, utility support, and online permitting
        portals, all currently active.
      </p>

      <div class="resources-grid">
        ${data.help_resources.map(r => `
          <a class="resource-card" href="${esc(r.url)}" target="_blank" rel="noopener">
            <div class="resource-head">
              <div class="resource-title">${esc(r.name)}</div>
              <div class="resource-arrow">↗</div>
            </div>
            <div class="resource-desc">${esc(r.desc)}</div>
            ${r.address ? `<div class="resource-meta">${esc(r.address)}</div>` : ''}
          </a>
        `).join('')}
      </div>

      <p class="sources-note">
        For broader recovery support — mental health, housing assistance, insurance
        disputes, legal aid — start with <a href="https://recovery.lacity.gov/" target="_blank" rel="noopener">LA Strong</a>
        or call 211. This list focuses specifically on rebuilding-process help.
      </p>
    </section>
    ` : ''}

    ${data.resources && data.resources.length ? `
    <section id="sources" class="rule-top">
      <h2 class="section-title">Where this data comes from</h2>
      <p class="section-subtitle">
        Every number on this page traces back to one of these sources.
        Most are updated daily or hourly.
      </p>

      <div class="resources-grid">
        ${data.resources.map(r => `
          <a class="resource-card" href="${esc(r.url)}" target="_blank" rel="noopener">
            <div class="resource-head">
              <div class="resource-title">${esc(r.name)}</div>
              <svg class="resource-arrow" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M7 17L17 7M17 7H7M17 7v10"/></svg>
            </div>
            <div class="resource-desc">${esc(r.desc)}</div>
          </a>
        `).join('')}
      </div>
    </section>
    ` : ''}

    <section id="methodology" class="rule-top">
      <h2 class="section-title">How we count</h2>
      <p class="section-subtitle">
        Every number on this page traces to a specific public source. Here's
        exactly where each one comes from, and how often it refreshes.
      </p>

      <div class="methodology">
        <div class="method-row">
          <div>
            <div class="method-label">Permit numbers</div>
            <div class="method-cadence">Refreshed daily</div>
          </div>
          <div class="method-detail">
            Applications received, permits issued, average days to permit, and
            average days in agency review. Pulled each morning at 6 AM Pacific
            from the California state rebuilding dashboard, which aggregates
            official data from each jurisdiction. The "City of Los Angeles"
            figures cover single-family residences, duplexes, and accessory
            dwelling units within City limits — where the vast majority of
            Palisades parcels sit.
          </div>
        </div>

        <div class="method-row">
          <div>
            <div class="method-label">Construction + completions</div>
            <div class="method-cadence">Manually updated</div>
          </div>
          <div class="method-detail">
            Projects under construction and certificates of occupancy issued.
            These come from City of LA periodic reporting — Mayor's press
            releases, LADBS announcements — and are updated here when new
            figures are published, typically every four to eight weeks.
          </div>
        </div>

        <div class="method-row">
          <div>
            <div class="method-label">Commercial + business watch</div>
            <div class="method-cadence">Manually curated</div>
          </div>
          <div class="method-detail">
            Commercial permit counts and individual business statuses come from public reporting
            (Palisadian-Post, CoStar, Palisades News, LAist, business announcements). The state
            dashboard doesn't break out commercial separately, so this is hand-tracked.
            Updated when significant business news drops.
          </div>
        </div>

        <div class="method-row">
          <div>
            <div class="method-label">Timeline + neighborhoods</div>
            <div class="method-cadence">Curated</div>
          </div>
          <div class="method-detail">
            Milestone dates and neighborhood-level permit shares are
            hand-curated from public reporting — Palisadian-Post,
            Pali Builds, and government press releases. Updated when
            significant new milestones occur or when fresh neighborhood
            data is released.
          </div>
        </div>
      </div>

      <div class="callout">
        <div class="callout-label">Why other trackers show different numbers</div>
        <p class="callout-text">
          Every public Palisades rebuild tracker — Pali Builds, the City's
          hourly LADBS dashboard, the Mayor's press releases — reports
          somewhat different totals. The differences come from how each
          source defines a "rebuild permit" (single-family only versus all
          categories), how addresses with multiple permits are counted, and
          how often each refreshes. We use the state dashboard because it's
          the most-cited "official" aggregator and presents data in a
          structured format that allows reliable daily updates.
        </p>
      </div>
    </section>

    <footer class="rule-double-top">
      <div class="footer-row">
        <div class="footer-about">
          <div class="footer-about-title">About this tracker</div>
          <p class="footer-about-text">
            An independent, community-facing aggregation of public rebuilding data.
            Not affiliated with the City of Los Angeles, LA County, or any government agency.
            Data refreshed daily from the California state rebuilding dashboard.
            For official information or to file applications, see the resources above.
          </p>
        </div>
        <div class="footer-meta">
          Day ${days} · ${esc(updated)}<br/>
          <span class="dot">●</span> Tracking continues
        </div>
      </div>
    </footer>
  `;

  document.getElementById('app').innerHTML = html;
}

function heroStat(count, label, percentage) {
  return `
    <div class="hero-stat">
      <div class="hero-stat-count">${fmt(count)}</div>
      <div class="hero-stat-meta">
        <div class="hero-stat-label">${esc(label)}</div>
        <div class="hero-stat-pct">${percentage}%</div>
      </div>
    </div>
  `;
}

function statCell(label, value, sub, accent) {
  return `
    <div class="stat-cell ${accent ? 'accent' : ''}">
      <div class="stat-label">${esc(label)}</div>
      <div>
        <div class="stat-value">${esc(value)}</div>
        <div class="stat-sub">${esc(sub)}</div>
      </div>
    </div>
  `;
}

fetch('./data/current.json?v=' + Date.now())
  .then(r => { if (!r.ok) throw new Error('HTTP ' + r.status); return r.json(); })
  .then(render)
  .catch(() => render(INLINE_DATA));
</script>
</body>
</html>
